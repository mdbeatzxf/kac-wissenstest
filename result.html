<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>KAC Wissenstest</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body data-page="result">
    <div class="topbar">
      <span class="brand" data-i18n="appTitel">KAC Production Team – Wissenstest</span>
      <div class="lang">
        <button data-lang="de">DE</button>
        <button data-lang="en">EN</button>
      </div>
    </div>

    <div class="wrap">
      <div class="card result">
        <p class="sub" data-i18n="ergebnis">Dein Ergebnis</p>
        <div class="verdict" id="verdict">…</div>
        <div class="score-big" id="scoreBig">–</div>
        <div class="score-detail" id="scoreDetail"></div>
        <div class="pass-info" id="passInfo"></div>
        <div class="status" id="statusText"></div>
        <button class="btn" id="homeBtn" data-i18n="nochmal">Zur Startseite</button>
      </div>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
