<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>KAC Wissenstest</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body data-page="login">
    <div class="topbar">
      <span class="brand" data-i18n="appTitel">KAC Production Team – Wissenstest</span>
      <div class="lang">
        <button data-lang="de">DE</button>
        <button data-lang="en">EN</button>
      </div>
    </div>

    <div class="wrap">
      <!-- Login -->
      <div class="card" id="loginView">
        <h1 data-i18n="appTitel">KAC Production Team – Wissenstest</h1>
        <p class="sub" data-i18n="loginUnter">Melde dich mit deinem Namen an.</p>

        <label for="vorname" data-i18n="vorname">Vorname</label>
        <input id="vorname" type="text" autocomplete="given-name" data-i18n-ph="vorname" />

        <label for="nachname" data-i18n="nachname">Nachname</label>
        <input id="nachname" type="text" autocomplete="family-name" data-i18n-ph="nachname" />

        <button class="btn" id="loginBtn" data-i18n="weiter">Weiter</button>
        <div class="error" id="loginError"></div>
      </div>

      <!-- Testauswahl -->
      <div class="card" id="testView" hidden>
        <h1 id="greeting">Hallo!</h1>
        <p class="sub" data-i18n="bereichWaehlen">Welchen Test möchtest du machen?</p>
        <div class="test-cards" id="testButtons"></div>
        <button class="btn ghost" id="logoutBtn" data-i18n="abmelden">Abmelden</button>
      </div>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
