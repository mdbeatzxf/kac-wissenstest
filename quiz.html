<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <title>KAC Wissenstest</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body data-page="quiz">
    <div class="topbar">
      <span class="brand" data-i18n="appTitel">KAC Production Team – Wissenstest</span>
      <div class="lang">
        <button data-lang="de">DE</button>
        <button data-lang="en">EN</button>
      </div>
    </div>

    <div class="wrap">
      <div class="card">
        <div class="quiz-head">
          <span class="progress" id="progressText">–</span>
          <span class="timer-num" id="timerText">–</span>
        </div>
        <div class="timer-track"><div class="timer-bar" id="timerBar"></div></div>

        <span class="topic" id="topicChip"></span>
        <p class="question" id="questionText">…</p>
        <div class="options" id="options"></div>

        <button class="btn" id="confirmBtn" disabled data-i18n="antwortBestaetigen">
          Antwort bestätigen
        </button>
        <button class="btn ghost" id="cancelBtn" data-i18n="quizAbbrechen">Abbrechen</button>
      </div>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
